<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>设备状态检测器 - 赤石科技 - Vanadiry</title>
    <link rel="stylesheet" href="/assets/lab/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        h2 { text-align: center; margin-bottom: 8px; }
        .lab-container { max-width: 520px; width: 100%; }

        :root {
            --est-detect-btn-bg: linear-gradient(90deg, #4f8cff 0%, #38e8ff 100%);
            --est-detect-btn-bg-disabled: #e0e0e0;
            --est-detect-btn-color: #fff;
            --est-detect-btn-color-disabled: #b0b0b0;
            --est-detect-btn-shadow: 0 2px 8px rgba(79,140,255,0.10);
            --est-detect-status-color: #38b000;
            --est-detect-progress-bg: #e0e0e0;
            --est-detect-progress-bar: linear-gradient(90deg, #4f8cff 0%, #38e8ff 100%);
            --est-detect-step-color: #4f8cff;
            --est-detect-text-color: #222;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --est-detect-btn-bg: linear-gradient(90deg, #3a6fd8 0%, #1ec8e8 100%);
                --est-detect-btn-bg-disabled: #33373d;
                --est-detect-btn-color: #e0e0e0;
                --est-detect-btn-color-disabled: #666c7a;
                --est-detect-btn-shadow: 0 2px 8px rgba(79,140,255,0.05);
                --est-detect-status-color: #7fff7f;
                --est-detect-progress-bg: #33373d;
                --est-detect-progress-bar: linear-gradient(90deg, #3a6fd8 0%, #1ec8e8 100%);
                --est-detect-step-color: #7bbaff;
                --est-detect-text-color: #e0e0e0;
            }
        }

        .es-checker-wrap {
            color: var(--est-detect-text-color);
            transition: background 0.2s, color 0.2s;
        }

        #checkButton {
            display: block;
            width: 100%;
            background: var(--est-detect-btn-bg);
            color: var(--est-detect-btn-color);
            border: none;
            border-radius: var(--lab-radius);
            padding: 16px 0;
            font-size: 1.15em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--est-detect-btn-shadow);
            transition: background 0.2s, transform 0.1s, color 0.2s;
            position: relative;
            font-family: var(--lab-font);
        }
        #checkButton:active { transform: scale(0.98); }
        #checkButton.disabled, #checkButton:disabled {
            background: var(--est-detect-btn-bg-disabled) !important;
            color: var(--est-detect-btn-color-disabled) !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }
        #spinner { display: none; vertical-align: middle; margin-right: 10px; }
        #status {
            margin-top: 18px;
            font-size: 1.2em;
            color: var(--est-detect-status-color);
            text-align: center;
            min-height: 2.2em;
        }
        #status:empty { margin-top: 0; min-height: 0; }
        #loader { display: none; margin-top: 12px; text-align: center; }

        #progressBarContainer {
            width: 100%;
            height: 12px;
            background: var(--est-detect-progress-bg);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        #progressBar {
            height: 100%;
            width: 0;
            background: var(--est-detect-progress-bar);
            transition: width 0.4s;
        }
        #currentStep {
            margin: 0 0 8px 0;
            color: var(--est-detect-step-color);
            font-size: 1.08em;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://data.vanadiry.com/site/favicon.ico">
    <script src="/assets/control.js"></script>
</head>

<body>
    <div class="lab-container">
        <h2>设备状态检测器</h2>
        <div class="es-checker-wrap">
            <button id="checkButton">
                <span id="spinner"><svg width="20" height="20" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="#b0b0b0" stroke-width="6" opacity="0.18"/><circle cx="25" cy="25" r="20" fill="none" stroke="#4f8cff" stroke-width="6" stroke-linecap="round" stroke-dasharray="40 85"><animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="0.7s" repeatCount="indefinite"/></circle></svg></span>
                <span id="buttonText">开始检测</span>
            </button>
            <div id="status"></div>
            <div id="loader">
                <div id="progressBarContainer">
                    <div id="progressBar"></div>
                </div>
                <p id="currentStep"></p>
            </div>
        </div>
    </div>
    <div class="lab-footer">
        © 2026 Vanadiry 版权所有
    </div>

    <script>
    const btn = document.getElementById('checkButton');
    const status = document.getElementById('status');
    const loader = document.getElementById('loader');
    const bar = document.getElementById('progressBar');
    const step = document.getElementById('currentStep');
    const btnText = document.getElementById('buttonText');
    const spin = document.getElementById('spinner');
    const steps = [
        "分析硬件信息...",
        "扫描系统日志...",
        "检查电源状态...",
        "验证固件版本...",
        "读取传感器数据..."
    ];
    let checking = false;
    btn.addEventListener('click', async () => {
        if (checking) return;
        checking = true;
        btn.classList.add('disabled');
        btn.setAttribute('disabled', 'disabled');
        spin.style.display = 'inline-block';
        btnText.textContent = '正在检测';
        status.textContent = '';
        loader.style.display = 'block';
        bar.style.width = '0';
        step.textContent = '';
        for (let i = 0; i < steps.length; i++) {
            step.textContent = steps[i];
            bar.style.width = `${((i + 1) / steps.length) * 100}%`;
            await new Promise(res => setTimeout(res, 1600 + Math.random() * 1200));
        }
        loader.style.display = 'none';
        status.textContent = "恭喜，设备当前是开机状态！";
        status.style.color = getComputedStyle(document.documentElement).getPropertyValue('--est-detect-status-color').trim() || "#38b000";
        spin.style.display = 'none';
        btn.classList.remove('disabled');
        btn.removeAttribute('disabled');
        btnText.textContent = '重新检测';
        checking = false;
    });
    </script>
</body>

</html>
