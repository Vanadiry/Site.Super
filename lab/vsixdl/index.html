<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>VSCode 扩展 VSIX 下载器 - Vanadiry</title>
    <link rel="stylesheet" href="/assets/lab/style.css">
    <style>
        .lab-container { max-width: 960px; }
        h2 { cursor: pointer; user-select: none; }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input {
            flex: 1; padding: 10px; font-size: 16px;
            border: 1px solid var(--lab-border); border-radius: var(--lab-radius);
        }
        .search-box button { padding: 10px 16px; font-size: 16px; white-space: nowrap; }

        .results-grid { column-count: 2; column-gap: 15px; }
        .results-grid .card { break-inside: avoid; margin-bottom: 15px; }
        .results-grid .card-full { column-span: all; }
        .results-grid .status-row { column-span: all; text-align: center; padding: 40px; }

        .card { background: #fff; padding: 14px; border-radius: 10px; box-shadow: var(--lab-shadow); }
        .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .header-row img { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; }
        .card-title { font-size: 17px; font-weight: 600; color: #111827; line-height: 1.2; }
        .card-sub { color: #6b7280; font-size: 13px; }
        .card-desc { color: #374151; margin-bottom: 12px; font-size: 13px; line-height: 1.5; }
        .button-row { display: flex; gap: 8px; }
        .card-exact { border-left: 3px solid var(--lab-accent); }

        .intro-text {
            column-span: all; background: #fff; padding: 20px;
            border-radius: 12px; box-shadow: var(--lab-shadow);
            line-height: 1.7; color: #374151; font-size: 15px;
        }
        .intro-text p { margin: 0; }
        .intro-text code { background: #eef0f3; padding: 2px 4px; border-radius: 4px; font-size: 13px; color: #111; }

        /* 底部加载 / 下载条 */
        .dl-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
            background: #1f2937; color: #fff; padding: 10px 20px;
            display: flex; align-items: center; gap: 12px; font-size: 13px;
            transform: translateY(100%); transition: transform 0.25s;
        }
        .dl-bar.active { transform: translateY(0); }
        .dl-bar .dl-progress {
            flex: 1; height: 5px; background: #374151; border-radius: 3px; overflow: hidden;
        }
        .dl-bar .dl-fill {
            height: 100%; background: var(--lab-accent); border-radius: 3px;
            width: 0; transition: width 0.2s;
        }
        .dl-bar .dl-fill.indeterminate {
            width: 30%; animation: dl-indeterminate 1.2s ease-in-out infinite;
        }
        @keyframes dl-indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(430%); }
        }

        /* 全屏弹窗 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);
            z-index: 1000; display: flex; align-items: flex-start; justify-content: center;
            padding: 40px 20px; overflow-y: auto;
        }
        .modal {
            background: #fff; border-radius: 12px; max-width: 800px; width: 100%;
            padding: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .modal-header h3 { margin: 0; font-size: 16px; }
        .modal-close {
            width: 32px; height: 32px; border: none; background: #e5e7eb;
            border-radius: 8px; font-size: 18px; cursor: pointer; line-height: 1; color: #374151;
            flex-shrink: 0;
        }
        .modal-close:hover { background: #d1d5db; }

        .modal-to-top {
            position: sticky; bottom: 16px; float: right;
            width: 36px; height: 36px; border: none; background: #374151; color: #fff;
            border-radius: 50%; font-size: 18px; cursor: pointer; line-height: 1;
            opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        .modal-to-top.visible { opacity: 1; pointer-events: auto; }
        .modal-to-top:hover { background: #1f2937; }

        .ext-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .info-text { margin: 6px 0; color: #4b5563; font-size: 13px; }
        .download-btn {
            display: inline-block; padding: 5px 10px; background: #2563eb; color: #fff;
            text-decoration: none; border-radius: 6px; font-size: 13px;
            white-space: nowrap; border: none; cursor: pointer; font-family: var(--lab-font);
        }
        .download-btn:hover { background: #1d4ed8; }
        .download-btn.disabled { background: #9ca3af; pointer-events: none; }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VSCode 扩展下载器，快速获取 Visual Studio Code 插件版本与离线安装包，支持历史版本查看。">
    <meta name="keywords" content="VSCode 扩展, VSCode 插件下载, Visual Studio Code Extensions, VSIX, VSCode 历史版本, Vanadiry">
    <meta name="author" content="Vanadiry">
    <meta name="robots" content="index,follow">
    <meta property="og:title" content="VSCode 扩展 VSIX 下载器 - Vanadiry">
    <meta property="og:description" content="VSCode 扩展下载器，快速获取 Visual Studio Code 插件版本与离线安装包，支持历史版本查看。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vanadiry.com/lab/vsixdl/">
    <meta property="og:image" content="https://data.vanadiry.com/site/siteicon.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/x-icon" href="https://data.vanadiry.com/site/favicon.ico">
    <script src="/assets/control.js"></script>
</head>

<body>
    <div class="lab-container">
        <h2 id="pageTitle">🎉 VSCode 扩展下载器</h2>
        <div class="search-box">
            <input id="keyword" placeholder="输入关键词 或 publisher.extension" autofocus>
            <button class="lab-btn" id="btnSearch">搜索</button>
            <button class="lab-btn secondary" id="btnReset">重置</button>
        </div>
        <div id="results" class="results-grid">
            <div class="intro-text" id="introText">
                <p>微软不让从网页上直接下载 VSCode 插件的文件了 😅<br>
                    所以做了这个网站，用来下载他不让下载的 😋<br><br>
                    <strong>搜索：</strong><br>
                    输入关键词模糊搜索，类似 VSCode 的搜索模式。<br>
                    输入 <code>ms-python.python</code> 这样的插件 ID，会尝试精准匹配并搜索。<br><br>
                    页面调用微软官方 API，不会保存你的任何数据。<br>
                    联系方式：<a href="https://magic.vanadiry.com/about/contact/">点此</a>，希望你用得开心 :)
                </p>
            </div>
        </div>
        <footer class="lab-footer">
            © 2026 <a href="https://vanadiry.com/">Vanadiry</a> 版权所有
        </footer>
    </div>

    <div class="dl-bar" id="dlBar">
        <span id="dlLabel">正在下载...</span>
        <div class="dl-progress"><div class="dl-fill" id="dlFill"></div></div>
        <span id="dlPercent"></span>
    </div>

    <script>
        const API = 'https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery';
        const HEADERS = {
            'Content-Type': 'application/json',
            Accept: 'application/json;api-version=3.0-preview.1',
            'User-Agent': 'VSCode',
            'X-Market-Client-Id': 'VSCode'
        };
        const ICON_FALLBACK = 'data:image/svg+xml,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#e5e7eb"/><rect x="10" y="12" width="28" height="24" rx="3" fill="#9ca3af" opacity="0.6"/><rect x="14" y="16" width="20" height="16" rx="2" fill="#f3f4f6"/><circle cx="28" cy="24" r="5" fill="#9ca3af" opacity="0.5"/></svg>'
        );

        const $ = id => document.getElementById(id);
        const keyword = $('keyword');
        const results = $('results');
        const introText = $('introText');
        let searching = false;

        // ---- 底部横条 ----
        function showLoading(label) {
            const bar = $('dlBar'), fill = $('dlFill'), lbl = $('dlLabel'), pct = $('dlPercent');
            bar.classList.add('active');
            lbl.textContent = label;
            pct.textContent = '';
            fill.style.width = '';
            fill.style.background = '';
            fill.classList.add('indeterminate');
        }
        function hideLoading() {
            $('dlBar').classList.remove('active');
        }

        // ---- 搜索 ----
        keyword.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
        $('pageTitle').addEventListener('click', reset);
        $('btnSearch').addEventListener('click', doSearch);
        $('btnReset').addEventListener('click', reset);

        function isExtensionId(q) { return /^[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+$/.test(q); }

        async function doSearch() {
            const q = keyword.value.trim();
            if (!q || searching) return;
            searching = true;
            showLoading('搜索中...');

            try {
                if (isExtensionId(q)) {
                    const [idResult, kwResult] = await Promise.allSettled([
                        fetchAPI([{ filterType: 7, value: q }], 1),
                        fetchAPI([{ filterType: 10, value: q }], 50)
                    ]);
                    const idExt = idResult.status === 'fulfilled' ? idResult.value[0] : null;
                    const kwList = kwResult.status === 'fulfilled' ? kwResult.value : [];
                    const idKey = idExt ? (idExt.publisher.publisherName + '.' + idExt.extensionName).toLowerCase() : null;
                    const filtered = idKey ? kwList.filter(e =>
                        (e.publisher.publisherName + '.' + e.extensionName).toLowerCase() !== idKey
                    ) : kwList;

                    results.innerHTML = '';
                    if (idExt) results.appendChild(renderCard(idExt, true));
                    if (filtered.length === 0 && !idExt) {
                        results.innerHTML = '<p class="status-row" style="color:#b91c1c">无结果。</p>';
                    } else {
                        filtered.forEach(e => results.appendChild(renderCard(e, false)));
                    }
                } else {
                    const list = await fetchAPI([{ filterType: 10, value: q }], 50);
                    results.innerHTML = '';
                    if (list.length === 0) {
                        results.innerHTML = '<p class="status-row" style="color:#b91c1c">无结果。</p>';
                    } else {
                        list.forEach(e => results.appendChild(renderCard(e, false)));
                    }
                }
            } catch (e) {
                results.innerHTML = '<p class="status-row" style="color:#b91c1c">搜索失败，请检查网络连接后重试。</p>';
            }
            hideLoading();
            searching = false;
        }

        async function fetchAPI(criteria, pageSize) {
            const res = await fetch(API, {
                method: 'POST', headers: HEADERS,
                body: JSON.stringify({ filters: [{ criteria, pageNumber: 1, pageSize }], flags: 914 })
            });
            const json = await res.json();
            return json.results?.[0]?.extensions || [];
        }

        function reset() {
            keyword.value = '';
            results.innerHTML = '';
            results.appendChild(introText);
            keyword.focus();
        }

        function renderCard(ext, exact) {
            const latest = ext.versions[0];
            const icon = latest.files.find(f => f.assetType === 'Microsoft.VisualStudio.Services.Icons.Default')?.source
                || latest.files.find(f => f.assetType === 'Microsoft.VisualStudio.Services.Icons.Small')?.source
                || ICON_FALLBACK;
            const vsixUrl = latest.files.find(f => f.assetType === 'Microsoft.VisualStudio.Services.VSIXPackage')?.source;
            const filename = ext.publisher.publisherName + '.' + ext.extensionName + '-' + latest.version + '.vsix';

            const card = document.createElement('div');
            card.className = 'card' + (exact ? ' card-full card-exact' : '');
            card.innerHTML =
                `<div class="header-row">
                    <img src="${icon}" alt="icon" onerror="this.src='${ICON_FALLBACK}'">
                    <div>
                        <div class="card-title">${ext.displayName}</div>
                        <div class="card-sub">${ext.publisher.publisherName} · v${latest.version}</div>
                    </div>
                </div>
                <div class="card-desc">${ext.shortDescription || '暂无描述'}</div>
                <div class="button-row">
                    <button class="lab-btn-sm dl-trigger">下载 VSIX</button>
                    <button class="lab-btn-sm hist-trigger">历史版本</button>
                </div>`;

            card.querySelector('.dl-trigger').addEventListener('click', () => {
                if (vsixUrl) downloadVSIX(vsixUrl, filename);
            });
            card.querySelector('.hist-trigger').addEventListener('click', () => showHistory(ext));
            return card;
        }

        // ---- 下载 ----
        async function downloadVSIX(url, filename) {
            const bar = $('dlBar'), fill = $('dlFill'), label = $('dlLabel'), pct = $('dlPercent');
            bar.classList.add('active');
            label.textContent = filename;
            pct.textContent = '';
            fill.style.width = '';
            fill.style.background = '';
            fill.classList.add('indeterminate');

            try {
                const res = await fetch(url);
                const total = +res.headers.get('Content-Length');
                const reader = res.body.getReader();
                const chunks = [];
                let received = 0;

                if (total) {
                    fill.classList.remove('indeterminate');
                    fill.style.width = '0%';
                    pct.textContent = '0%';
                }

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    if (total) {
                        const p = Math.round(received / total * 100);
                        fill.style.width = p + '%';
                        pct.textContent = p + '%';
                    }
                }

                const blob = new Blob(chunks);
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);

                label.textContent = '下载完成：' + filename;
                fill.style.width = '100%';
                pct.textContent = '✓';
                fill.classList.remove('indeterminate');
                setTimeout(() => bar.classList.remove('active'), 2000);
            } catch (e) {
                label.textContent = '下载失败，请重试';
                fill.classList.remove('indeterminate');
                fill.style.width = '100%';
                fill.style.background = '#dc2626';
                setTimeout(() => {
                    bar.classList.remove('active');
                    fill.style.background = '';
                }, 2500);
            }
        }

        // ---- 全屏弹窗 ----
        async function showHistory(ext) {
            showLoading('加载版本列表...');

            let fullExt = ext;
            try {
                const body = {
                    filters: [{
                        criteria: [
                            { filterType: 7, value: ext.publisher.publisherName + '.' + ext.extensionName },
                            { filterType: 8, value: 'Microsoft.VisualStudio.Code' },
                            { filterType: 12, value: '4096' }
                        ],
                        pageNumber: 1, pageSize: 1
                    }],
                    flags: 55
                };
                const res = await fetch(API, { method: 'POST', headers: HEADERS, body: JSON.stringify(body) });
                const data = await res.json();
                if (data?.results?.[0]?.extensions?.[0]) fullExt = data.results[0].extensions[0];
            } catch (e) { /* 降级 */ }

            hideLoading();

            const latest = fullExt.versions[0];
            const icon = latest.files.find(f => f.assetType === 'Microsoft.VisualStudio.Services.Icons.Default')?.source
                || latest.files.find(f => f.assetType === 'Microsoft.VisualStudio.Services.Icons.Small')?.source
                || '';
            const versions = [...fullExt.versions].sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated));

            let rows = '';
            versions.forEach(v => {
                const vsix = (v.files || []).find(f => f.assetType === 'Microsoft.VisualStudio.Services.VSIXPackage');
                const fn = fullExt.publisher.publisherName + '.' + fullExt.extensionName + '-' + v.version + '.vsix';
                rows += `<tr>
                    <td>${vsix
                        ? `<button class="download-btn" data-url="${vsix.source}" data-fn="${fn}">下载</button>`
                        : '<span class="download-btn disabled">无文件</span>'}</td>
                    <td><span class="lab-badge">${v.version}</span></td>
                    <td>${fmt(v.lastUpdated)}</td>
                </tr>`;
            });

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML =
                `<div class="modal">
                    <div class="modal-header">
                        <h3>历史版本</h3>
                        <button class="modal-close">&times;</button>
                    </div>
                    <div class="card" style="margin-bottom:12px;">
                        <div class="header-row">
                            ${icon ? `<img class="ext-logo" src="${icon}" alt="icon">` : ''}
                            <div>
                                <div class="card-title">${fullExt.displayName}</div>
                                <div class="card-sub">${fullExt.publisher.publisherName}.${fullExt.extensionName}</div>
                            </div>
                        </div>
                        <div class="card-desc">${fullExt.shortDescription || ''}</div>
                        <div class="info-text">
                            <b>上次更新：</b><code>${fmt(fullExt.lastUpdated)}</code><br>
                            <b>发布日期：</b><code>${fmt(fullExt.releaseDate)}</code>
                        </div>
                    </div>
                    <div class="info-text">共 ${versions.length} 个版本</div>
                    <table class="lab-table" style="font-size:13px;">
                        <tbody>${rows}</tbody>
                    </table>
                    <button class="modal-to-top" id="modalToTop">↑</button>
                </div>`;

            document.body.appendChild(overlay);

            // 一键回顶
            const toTop = overlay.querySelector('#modalToTop');
            const onScroll = () => toTop.classList.toggle('visible', overlay.scrollTop > 300);
            overlay.addEventListener('scroll', onScroll);
            toTop.addEventListener('click', () => overlay.scrollTo({ top: 0, behavior: 'smooth' }));
            const prevOverflow = document.body.style.overflow;
            document.body.style.overflow = 'hidden';

            overlay.querySelectorAll('.download-btn[data-url]').forEach(btn => {
                btn.addEventListener('click', () => downloadVSIX(btn.dataset.url, btn.dataset.fn));
            });

            const close = () => {
                overlay.remove();
                document.body.style.overflow = prevOverflow;
            };
            overlay.querySelector('.modal-close').addEventListener('click', close);
            overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
            const onEsc = e => { if (e.key === 'Escape') { close(); document.removeEventListener('keydown', onEsc); } };
            document.addEventListener('keydown', onEsc);
        }

        function fmt(t) {
            if (!t) return '-';
            const d = new Date(t);
            return isNaN(d) ? t : d.toLocaleString();
        }
    </script>
</body>
