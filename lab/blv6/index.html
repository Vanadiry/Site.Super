<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>Bilibili 等级计算器 - Vanadiry</title>
    <script src="/assets/control.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bilibili 等级计算器：根据你的每日登录、观看、分享、投币情况，模拟经验与硬币变化，精确计算到达 LV2 - LV6 所需天数。">
    <meta name="keywords" content="Bilibili 等级计算器,B站经验计算,B站升级,哔哩哔哩 升级速度,Bilibili 等级模拟器,Vanadiry">
    <meta name="author" content="Vanadiry">
    <meta name="robots" content="index,follow">
    <meta property="og:title" content="Bilibili 等级计算器 - Vanadiry">
    <meta property="og:description" content="每日模拟经验增长、硬币消耗与风纪委员奖励，让你精确预测升级所需时间。支持 LV2-LV6。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vanadiry.com/lab/blv6/">
    <meta property="og:image" content="https://data.vanadiry.com/site/siteicon.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/x-icon" href="https://data.vanadiry.com/site/favicon.ico">
    <link rel="stylesheet" href="/assets/lab/style.css">
    <style>
        .lab-container { max-width: 900px; user-select: none; }
        h2 { margin-bottom: 4px; }

        .lab-field { margin-bottom: 6px; }
        input, select { width: 100%; user-select: text; }

        .check-label {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 0; font-size: 15px; cursor: pointer;
        }
        .check-label input[type="checkbox"] {
            width: 18px; height: 18px; margin: 0; cursor: pointer; accent-color: var(--lab-accent);
        }

        .section-title {
            margin: 16px 0 2px; font-weight: 600; font-size: 15px;
            border-top: 1px solid var(--lab-border); padding-top: 12px;
        }

        .lab-btn {
            width: 100%; padding: 12px; margin-top: 16px; font-size: 16px; border-radius: 10px;
        }
        .lab-btn:active { transform: translateY(1px); }

        .result {
            margin-top: 16px; padding: 16px 20px;
            background: #e0f2fe; border-left: 4px solid #0284c7;
            border-radius: 8px; font-size: 14px; line-height: 1.8;
        }
        .result p { margin: 2px 0; }
        .result-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }

        .coin-info { margin-top: 10px; padding-top: 8px; border-top: 1px solid #bae6fd; color: #0369a1; }
    </style>
</head>

<body>
    <div class="lab-container">
        <h2>Bilibili 等级计算器</h2>
        <p class="lab-subtitle">根据你的每日行为，模拟未来经验与硬币变化，估算升级所需时间。</p>

        <div class="lab-field">
            <label for="curExp">当前经验</label>
            <input type="number" id="curExp" value="0" min="0" max="28800">
        </div>
        <div class="lab-field">
            <label for="coins">当前硬币</label>
            <input type="number" id="coins" value="0" min="0">
        </div>
        <div class="lab-field">
            <label for="targetLevel">目标等级</label>
            <select id="targetLevel">
                <option value="2">LV2</option>
                <option value="3">LV3</option>
                <option value="4">LV4</option>
                <option value="5">LV5</option>
                <option value="6" selected>LV6</option>
            </select>
        </div>

        <p class="section-title">每日行为</p>
        <label class="check-label">
            <input type="checkbox" id="dailyLogin"> 每日登录（+5 经验，+1 硬币）
        </label>
        <label class="check-label">
            <input type="checkbox" id="dailyWatch"> 每日观看视频（+5 经验）
        </label>
        <label class="check-label">
            <input type="checkbox" id="dailyShare"> 每日分享视频（+5 经验）
        </label>
        <label class="check-label">
            <input type="checkbox" id="judgeS"> 风纪委员月度 S（每 30 天 +30 硬币）
        </label>

        <div class="lab-field" style="margin-top:8px;">
            <label for="dailyCoin">每日投币数量</label>
            <select id="dailyCoin">
                <option value="0">0 个</option>
                <option value="1">1 个</option>
                <option value="2">2 个</option>
                <option value="3">3 个</option>
                <option value="4">4 个</option>
                <option value="5">5 个</option>
            </select>
        </div>

        <button id="calcBtn" class="lab-btn">开始计算</button>
        <div id="resultBox" class="result lab-hidden"></div>
    </div>
    <div class="lab-footer">
        © 2026 Vanadiry 版权所有
    </div>
    <script>
        const LEVEL_EXP = { 1: 0, 2: 200, 3: 1500, 4: 4500, 5: 10800, 6: 28800 };
        const MAX_EXP = 28800;

        function levelFromExp(exp) {
            let lv = 1;
            for (let i = 1; i <= 6; i++) { if (exp >= LEVEL_EXP[i]) lv = i; }
            return lv;
        }

        function simulate(config) {
            const { curExp, targetLevel, curCoins, dailyLogin, dailyWatch, dailyShare, dailyCoinDesired, judgeS } = config;
            const baseDailyExp = (dailyLogin ? 5 : 0) + (dailyWatch ? 5 : 0) + (dailyShare ? 5 : 0);
            const targetExp = LEVEL_EXP[targetLevel];

            if (baseDailyExp === 0 && dailyCoinDesired === 0) {
                return { impossible: true, baseDailyExp: 0 };
            }

            let exp = curExp, coins = curCoins, day = 0;
            const daysToLevel = { 2: null, 3: null, 4: null, 5: null, 6: null };
            let coinsZeroDay = null, failed = false;

            while (exp < targetExp) {
                if (coinsZeroDay !== null && baseDailyExp === 0) { failed = true; break; }

                day++;
                if (judgeS && day % 30 === 0) coins += 30;
                if (dailyLogin) coins += 1;
                let canSpendCoins = dailyCoinDesired;
                if (coins < canSpendCoins) canSpendCoins = Math.max(coins, 0);
                coins -= canSpendCoins;
                if (coinsZeroDay === null && dailyCoinDesired > 0 && coins <= 0) coinsZeroDay = day;
                exp += baseDailyExp + canSpendCoins * 10;

                for (let lv = 2; lv <= 6; lv++) {
                    if (daysToLevel[lv] === null && exp >= LEVEL_EXP[lv]) daysToLevel[lv] = day;
                }
            }

            return { baseDailyExp, daysToLevel, finalExp: exp, finalCoins: coins, coinsZeroDay, failed, impossible: false };
        }

        function computeTodayExp(curCoins, dailyLogin, dailyWatch, dailyShare, dailyCoinDesired) {
            const base = (dailyLogin ? 5 : 0) + (dailyWatch ? 5 : 0) + (dailyShare ? 5 : 0);
            let coinsToday = curCoins;
            if (dailyLogin) coinsToday += 1;
            const spendToday = Math.min(dailyCoinDesired, Math.max(coinsToday, 0));
            return base + spendToday * 10;
        }

        document.getElementById("calcBtn").addEventListener("click", function () {
            const curExp = Math.min(MAX_EXP, Math.max(0, Number(document.getElementById("curExp").value) || 0));
            const targetLevel = Number(document.getElementById("targetLevel").value);
            const curCoins = Math.max(0, Number(document.getElementById("coins").value) || 0);
            const dailyLogin = document.getElementById("dailyLogin").checked;
            const dailyWatch = document.getElementById("dailyWatch").checked;
            const dailyShare = document.getElementById("dailyShare").checked;
            let dailyCoinDesired = Number(document.getElementById("dailyCoin").value) || 0;
            const judgeS = document.getElementById("judgeS").checked;
            if (dailyCoinDesired < 0) dailyCoinDesired = 0;
            if (dailyCoinDesired > 5) dailyCoinDesired = 5;

            const resultBox = document.getElementById("resultBox");
            resultBox.classList.remove("lab-hidden");
            const currentLevel = levelFromExp(curExp);
            const todayExp = computeTodayExp(curCoins, dailyLogin, dailyWatch, dailyShare, dailyCoinDesired);

            if ((dailyLogin ? 5 : 0) + (dailyWatch ? 5 : 0) + (dailyShare ? 5 : 0) === 0 && dailyCoinDesired === 0) {
                resultBox.innerHTML = `<p class="result-title">📊 计算结果</p>
                    <p>你目前是 <b>LV${currentLevel}</b>（${curExp} 经验）。</p>
                    <p>当前未选择任何经验获取方式，无法升级。</p>`;
                return;
            }

            const sim = simulate({ curExp, targetLevel, curCoins, dailyLogin, dailyWatch, dailyShare, dailyCoinDesired, judgeS });

            let html = `<p class="result-title">📊 计算结果</p>`;
            html += `<p>你目前是 <b>LV${currentLevel}</b>（${curExp} 经验），第 1 天可获得 <b>${todayExp}</b> 点经验。</p>`;

            if (sim.failed) {
                html += `<p style="color:#b91c1c;">⚠ 硬币耗尽且无其他经验来源，无法到达目标。</p>`;
            } else {
                for (let lv = currentLevel + 1; lv <= targetLevel; lv++) {
                    const days = sim.daysToLevel[lv];
                    html += `<p>· `;
                    if (days !== null) {
                        html += `约 <b>${days}</b> 天到 LV${lv}`;
                    } else {
                        html += `无法到达 LV${lv}`;
                    }
                    html += `</p>`;
                }
            }

            html += `<div class="coin-info">🪙 `;
            if (dailyCoinDesired === 0) {
                html += `未选择投币，硬币不会被消耗（当前 ${Math.round(sim.finalCoins)} 个）。`;
            } else if (sim.coinsZeroDay !== null) {
                html += `按每日投 ${dailyCoinDesired} 个，预计第 <b>${sim.coinsZeroDay}</b> 天花完。`;
            } else {
                html += `按每日投 ${dailyCoinDesired} 个，到达 LV${targetLevel} 后大约剩余 <b>${Math.round(sim.finalCoins)}</b> 个硬币。`;
            }
            html += `</div>`;

            resultBox.innerHTML = html;
        });
    </script>
</body>

</html>
