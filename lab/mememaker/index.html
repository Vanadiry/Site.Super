<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>表情包生成器 - Vanadiry</title>
    <script src="/assets/control.js"></script>
    <link rel="icon" type="image/x-icon" href="https://data.vanadiry.com/site/favicon.ico">
    <link rel="stylesheet" href="style.css" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index,follow">
    <meta name="description" content="生成风格样式表情包，支持字体样式调整，自动排版和导出。在线可视化生成，所见即所得。">
    <meta name="keywords" content="表情包生成器, 文本图像工具, Vanadiry">
    <meta name="author" content="Vanadiry">
    <meta property="og:title" content="表情包生成器 - Vanadiry">
    <meta property="og:description" content="生成风格样式表情包，支持字体样式调整，自动排版和导出。在线可视化生成，所见即所得。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vanadiry.com/tools/mememaker/">
    <meta property="og:image" content="https://data.vanadiry.com/site/siteicon.png">
    <meta name="theme-color" content="#000000">
</head>

<body>
    <div class="app">
        <aside>
            <h2>设置</h2>
            <div class="field">
                <label>上传图片</label><input type="file" id="imageInput" accept="image/*" />
            </div>
            <div class="field">
                <label>文字1</label><textarea id="text1" placeholder="输入文字1" rows="2"></textarea>
            </div>
            <div class="field">
                <label>文字2</label><textarea id="text2" placeholder="输入文字2" rows="2"></textarea>
            </div>
            <div class="inline">
                <div class="field">
                    <label>字体</label>
                    <select id="fontFamily">
                        <option value="SimHei,STHeiti,Microsoft YaHei,sans-serif">黑体</option>
                        <option value="STKaiti,KaiTi,楷体,serif">楷体</option>
                        <option value="SimSun,Songti,宋体,serif">宋体</option>
                        <option value="Arial,Helvetica,sans-serif">Arial</option>
                        <option value="Courier New,monospace">等宽</option>
                    </select>
                </div>
                <div class="field">
                    <label>字号(px)</label><input type="number" id="fontSize" value="32" min="8" max="200" />
                </div>
                <div class="field">
                    <label>文字位置</label>
                    <select id="position">
                        <option value="out-bottom" selected>图片外-下</option>
                        <option value="out-top">图片外-上</option>
                        <option value="in-top">图片内-上</option>
                        <option value="in-bottom">图片内-下</option>
                    </select>
                </div>
            </div>
            <div class="inline">
                <div class="field">
                    <label>文字颜色</label><input type="color" id="textColor" value="#ffffff" />
                </div>
                <div class="field">
                    <label>背景颜色</label><input type="color" id="bgColor" value="#000000" />
                </div>
                <div class="field" style="align-self: flex-end">
                    <button id="syncBg" class="btn">同步底色</button>
                </div>
            </div>
            <div class="inline">
                <div class="field">
                    <label>行间距(px)</label><input type="number" id="lineSpacing" value="8" min="0" max="100" />
                </div>
                <div class="field">
                    <label>字间距(px)</label><input type="number" id="charSpacing" value="2" min="0" max="50" />
                </div>
            </div>
            <div class="inline">
                <div class="field">
                    <label>上边距(px)</label><input type="number" id="padTop" value="10" min="0" max="500" />
                </div>
                <div class="field">
                    <label>下边距(px)</label><input type="number" id="padBottom" value="10" min="0" max="500" />
                </div>
                <div class="field">
                    <label>左右边距(px)</label><input type="number" id="padX" value="10" min="0" max="500" />
                </div>
            </div>
            <div class="inline">
                <div class="field">
                    <label><input type="checkbox" id="invert" /> 反色</label>
                </div>
                <div class="field">
                    <label><input type="checkbox" id="grayscale" /> 黑白</label>
                </div>
            </div>
            <div style="margin-top: 10px">
                <button class="btn" id="reset">重置</button>
                <button class="btn primary" id="savePng">保存PNG</button>
                <button class="btn primary" id="saveJpg">保存JPG</button>
            </div>
        </aside>
        <main>
            <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        </main>
    </div>
    <script src="editor.js"></script>
</body>

</html>
